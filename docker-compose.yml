services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "8080:8000"
    depends_on:
      - mysql
    networks:
      - app-network
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: rrhh
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: proyecto-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - app-network
volumes:
  mysql_data:
    driver: local
networks:
  app-network:
    driver: bridge