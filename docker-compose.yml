services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    dns:
      - 8.8.8.8
      - 1.1.1.1

    environment:
      CHATBOT_OPENAI_ENABLED: ${CHATBOT_OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHATBOT_OPENAI_MODEL: ${CHATBOT_OPENAI_MODEL:-gpt-4o-mini}

    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor

      # Certificado SSL de Aiven
      - ./ca.pem:/var/www/html/ca.pem:ro

    ports:
      - "8000:8000"

    networks:
      - app-network

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube

    depends_on:
      - db

    ports:
      - "9000:9000"

    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar

    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

    networks:
      - app-network

  db:
    image: postgres:15
    container_name: sonarqube_db

    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar

    volumes:
      - postgresql_data:/var/lib/postgresql/data

    networks:
      - app-network

volumes:
  vendor_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  postgresql_data:

networks:
  app-network:
    driver: bridge