# Nombre del workflow que aparece en GitHub Actions
name: SonarCloud Analysis

# Se ejecuta cuando se hace push a la rama feature
on:
  push:
    branches:
      - feature

jobs:
  sonarcloud:
    # Máquina virtual donde se ejecuta el workflow
    runs-on: ubuntu-latest

    steps:
      # Clona el repositorio completo con todo el historial
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Ejecuta el análisis de SonarCloud
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          # Token guardado en GitHub Secrets
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}