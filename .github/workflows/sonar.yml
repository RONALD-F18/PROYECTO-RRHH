name: SonarQube Analysis

on:
  push:
    branches:
      - feature

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.RRHH }}
          SONAR_HOST_URL: http://localhost:9000/