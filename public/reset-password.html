<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — Sistema RRHH</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo:     #4F46E5;
      --indigo-dark:#3730A3;
      --indigo-soft:#EEF2FF;
      --indigo-dim: #a5b4fc;
      --surface:    #ffffff;
      --bg:         #f1f3f8;
      --text:       #1a1a2e;
      --muted:      #6b7280;
      --border:     #e2e5ef;
      --ok:         #059669;
      --ok-bg:      #d1fae5;
      --err:        #dc2626;
      --err-bg:     #fee2e2;
      --warn:       #d97706;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .45;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 2px 4px rgba(0,0,0,.04), 0 8px 32px rgba(79,70,229,.10);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* ── Header ── */
    .card-header {
      background: var(--indigo);
      padding: 22px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-header .logo-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,.18);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-header .logo-icon svg { width: 18px; height: 18px; }
    .card-header span {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    /* ── Body ── */
    .card-body { padding: 32px; }

    .card-body h2 {
      color: var(--text);
      font-size: 21px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-body .subtitle {
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    /* ── Alert ── */
    .alert {
      display: none;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 20px;
      border-left: 3px solid transparent;
    }
    .alert.success {
      display: block;
      background: var(--ok-bg);
      color: var(--ok);
      border-color: var(--ok);
    }
    .alert.error {
      display: block;
      background: var(--err-bg);
      color: var(--err);
      border-color: var(--err);
    }

    /* ── Field ── */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      padding: 11px 42px 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .input-wrap input:focus {
      border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }
    .input-wrap input.input-ok    { border-color: var(--ok); }
    .input-wrap input.input-error { border-color: var(--err); }

    /* toggle eye */
    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .toggle-eye:hover { color: var(--indigo); }
    .toggle-eye svg { width: 17px; height: 17px; }

    /* ── Strength bar ── */
    .strength-wrap {
      margin-top: 10px;
    }
    .strength-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 5px;
    }
    .strength-bars span {
      flex: 1;
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      transition: background .25s;
    }
    .strength-bars span.active-1 { background: var(--err); }
    .strength-bars span.active-2 { background: var(--warn); }
    .strength-bars span.active-3 { background: #84cc16; }
    .strength-bars span.active-4 { background: var(--ok); }

    .strength-label {
      font-size: 11.5px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* ── Rules checklist ── */
    .rules {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 12px;
      margin-top: 14px;
      margin-bottom: 4px;
    }
    .rules li {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color .2s;
    }
    .rules li .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background .2s;
    }
    .rules li.pass       { color: var(--ok); }
    .rules li.pass .dot  { background: var(--ok); }

    /* ── Confirm hint ── */
    .confirm-hint {
      font-size: 12px;
      margin-top: 5px;
      min-height: 16px;
      transition: color .2s;
    }
    .confirm-hint.match    { color: var(--ok); }
    .confirm-hint.no-match { color: var(--err); }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--indigo);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14.5px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 22px;
      letter-spacing: .2px;
      transition: background .18s, transform .1s, box-shadow .18s;
      box-shadow: 0 2px 8px rgba(79,70,229,.25);
    }
    .btn:hover:not(:disabled) {
      background: var(--indigo-dark);
      box-shadow: 0 4px 14px rgba(79,70,229,.35);
    }
    .btn:active:not(:disabled) { transform: scale(.99); }
    .btn:disabled {
      background: var(--indigo-dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Footer ── */
    .card-footer {
      border-top: 1px solid var(--border);
      padding: 14px 32px;
      text-align: center;
    }
    .card-footer p {
      font-size: 11.5px;
      color: #b0b8cc;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="card-header">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <span>Sistema RRHH</span>
  </div>

  <!-- Body -->
  <div class="card-body">
    <h2>Nueva contraseña</h2>
    <p class="subtitle">Crea una contraseña segura para restablecer tu acceso.</p>

    <div id="alert" class="alert"></div>

    <div id="resetForm">

      <!-- Campo contraseña -->
      <div class="field">
        <label>Nueva contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Escribe tu nueva contraseña" autocomplete="new-password" />
          <button class="toggle-eye" type="button" onclick="toggleVer('password', this)" aria-label="Ver contraseña">
            <svg id="eye-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <!-- Barra de fortaleza -->
        <div class="strength-wrap">
          <div class="strength-bars">
            <span id="bar1"></span>
            <span id="bar2"></span>
            <span id="bar3"></span>
            <span id="bar4"></span>
          </div>
          <span class="strength-label" id="strengthLabel">Escribe tu contraseña</span>
        </div>

        <!-- Checklist de reglas -->
        <ul class="rules">
          <li id="r-len">  <span class="dot"></span> 8 caracteres mínimo</li>
          <li id="r-upper"><span class="dot"></span> Una mayúscula</li>
          <li id="r-lower"><span class="dot"></span> Una minúscula</li>
          <li id="r-num">  <span class="dot"></span> Un número</li>
          <li id="r-spec" style="grid-column:1/-1"><span class="dot"></span> Un carácter especial (!@#$...)</li>
        </ul>
      </div>

      <!-- Campo confirmar -->
      <div class="field">
        <label>Confirmar contraseña</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="Repite la contraseña" autocomplete="new-password" />
          <button class="toggle-eye" type="button" onclick="toggleVer('confirm', this)" aria-label="Ver contraseña">
            <svg id="eye-confirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="confirm-hint" id="confirmHint"></div>
      </div>

      <button class="btn" id="btn" onclick="submitReset()">Restablecer contraseña</button>
    </div>
  </div>

  <div class="card-footer">
    <p>Correo automatico &mdash; no respondas este mensaje</p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  const email  = params.get('email');

  // SVG ojo abierto / cerrado
  const SVG_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const SVG_SHUT = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  function toggleVer(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.querySelector('svg').innerHTML = isText ? SVG_OPEN : SVG_SHUT;
    btn.setAttribute('aria-label', isText ? 'Ver contraseña' : 'Ocultar contraseña');
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
  }

  if (!token || !email) {
    showAlert('Enlace invalido. Solicita un nuevo correo de recuperacion.', 'error');
    document.getElementById('resetForm').style.display = 'none';
  }

  // ── Validación en tiempo real ──────────────────────────────────────────────
  const rules = {
    len:   p => p.length >= 8,
    upper: p => /[A-Z]/.test(p),
    lower: p => /[a-z]/.test(p),
    num:   p => /[0-9]/.test(p),
    spec:  p => /[^A-Za-z0-9]/.test(p),
  };

  const strengthMap = {
    0: { label: 'Escribe tu contraseña', cls: '' },
    1: { label: 'Muy debil',             cls: 'active-1' },
    2: { label: 'Debil',                 cls: 'active-2' },
    3: { label: 'Aceptable',             cls: 'active-3' },
    4: { label: 'Fuerte',                cls: 'active-4' },
    5: { label: 'Muy fuerte',            cls: 'active-4' },
  };

  document.getElementById('password').addEventListener('input', function () {
    const p     = this.value;
    const score = Object.values(rules).filter(fn => fn(p)).length;

    // checklist
    for (const [key, fn] of Object.entries(rules)) {
      const li = document.getElementById('r-' + key);
      li.classList.toggle('pass', fn(p));
    }

    // barra
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'),
                  document.getElementById('bar3'), document.getElementById('bar4')];
    const filled = Math.min(score, 4);
    const info   = strengthMap[score] || strengthMap[5];
    bars.forEach((b, i) => {
      b.className = i < filled ? info.cls : '';
    });
    document.getElementById('strengthLabel').textContent = p.length ? info.label : strengthMap[0].label;

    // estilo input
    this.className = p.length === 0 ? '' : score === 5 ? 'input-ok' : score < 3 ? 'input-error' : '';

    // re-evaluar coincidencia si ya hay algo en confirmar
    checkConfirm();
  });

  document.getElementById('confirm').addEventListener('input', checkConfirm);

  function checkConfirm() {
    const p = document.getElementById('password').value;
    const c = document.getElementById('confirm').value;
    const hint = document.getElementById('confirmHint');
    const inp  = document.getElementById('confirm');

    if (!c) {
      hint.textContent = '';
      hint.className   = 'confirm-hint';
      inp.className    = '';
      return;
    }
    if (p === c) {
      hint.textContent = 'Las contrasenas coinciden';
      hint.className   = 'confirm-hint match';
      inp.className    = 'input-ok';
    } else {
      hint.textContent = 'No coinciden';
      hint.className   = 'confirm-hint no-match';
      inp.className    = 'input-error';
    }
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  function getErrors(password) {
    const errs = [];
    if (!rules.len(password))   errs.push('Minimo 8 caracteres');
    if (!rules.upper(password)) errs.push('Al menos una mayuscula');
    if (!rules.lower(password)) errs.push('Al menos una minuscula');
    if (!rules.num(password))   errs.push('Al menos un numero');
    if (!rules.spec(password))  errs.push('Al menos un caracter especial');
    return errs;
  }

  async function submitReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('btn');

    const errors = getErrors(password);
    if (errors.length > 0) return showAlert(errors.join(' · '), 'error');
    if (password !== confirm) return showAlert('Las contrasenas no coinciden.', 'error');

    btn.disabled    = true;
    btn.textContent = 'Procesando...';

    try {
      const response = await fetch('http://localhost:8080/api/v1/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          email_usuario:                   email,
          token:                           token,
          contrasena_usuario:              password,
          contrasena_usuario_confirmation: confirm,
        })
      });

      const data = await response.json();

      if (data.success) {
        showAlert('Contrasena actualizada. Ya puedes iniciar sesion.', 'success');
        document.getElementById('resetForm').style.display = 'none';
      } else {
        showAlert(data.message || 'Token invalido o expirado.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Restablecer contrasena';
      }
    } catch (err) {
      showAlert('Error de conexion. Verifica que el servidor este activo.', 'error');
      btn.disabled    = false;
      btn.textContent = 'Restablecer contrasena';
    }
  }
</script>
</body>
</html>
